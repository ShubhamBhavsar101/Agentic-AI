<template id="s5-gateway-template">
  <div data-composition-id="s5-gateway" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />
    <div class="scene">
      <!-- Section label -->
      <div class="lbl">GATEWAY</div>

      <!-- Platform icons row -->
      <div class="platforms">
        <div class="plat p1">
          <div class="plat-icon">&#x1F4E1;</div>
          <div class="plat-name">Telegram</div>
        </div>
        <div class="plat p2">
          <div class="plat-icon">&#x1F4AC;</div>
          <div class="plat-name">Discord</div>
        </div>
        <div class="plat p3">
          <div class="plat-icon">&#x2709;&#xFE0F;</div>
          <div class="plat-name">Slack</div>
        </div>
        <div class="plat p4">
          <div class="plat-icon">&#x1F4F1;</div>
          <div class="plat-name">Signal</div>
        </div>
        <div class="plat p5">
          <div class="plat-icon">&#x1F310;</div>
          <div class="plat-name">Matrix</div>
        </div>
        <div class="plat p6">
          <div class="plat-icon">&#x1F4BB;</div>
          <div class="plat-name">CLI</div>
        </div>
      </div>

      <!-- Connection beam -->
      <div class="beam"></div>

      <!-- Tagline -->
      <div class="tagline">Wherever you are. Whatever you use.</div>
    </div>

    <style>
      [data-composition-id="s5-gateway"] { position: absolute; inset: 0; background: #07121c; overflow: hidden; }
      [data-composition-id="s5-gateway"] .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        padding: 100px 160px; box-sizing: border-box; gap: 40px;
      }
      [data-composition-id="s5-gateway"] .lbl {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 20px;
        color: #37bdf8; letter-spacing: 0.28em; text-transform: uppercase;
      }
      [data-composition-id="s5-gateway"] .platforms {
        display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
      }
      [data-composition-id="s5-gateway"] .plat {
        display: flex; flex-direction: column; align-items: center; gap: 10px;
        padding: 24px 32px; border-radius: 20px;
        background: #0d2031; border: 1.5px solid #252d33;
        min-width: 140px;
      }
      [data-composition-id="s5-gateway"] .plat-icon { font-size: 40px; }
      [data-composition-id="s5-gateway"] .plat-name {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 16px; color: #96a2b6;
      }
      [data-composition-id="s5-gateway"] .beam {
        width: 60%; height: 2px;
        background: linear-gradient(90deg, transparent, #37bdf8, transparent);
        box-shadow: 0 0 20px rgba(55,189,248,0.5);
      }
      [data-composition-id="s5-gateway"] .tagline {
        font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 36px;
        color: #ffffff; text-align: center;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const r = '[data-composition-id="s5-gateway"]';

        tl.from(r + " .lbl", { autoAlpha: 0, y: -20, duration: 0.35, ease: "expo.out" }, 0.2);
        tl.from(r + " .plat", {
          autoAlpha: 0, y: 30, scale: 0.85, duration: 0.4, ease: "back.out(1.5)", stagger: 0.1
        }, 0.4);
        tl.from(r + " .beam", { scaleX: 0, duration: 0.6, ease: "power2.out" }, 1.4);
        tl.from(r + " .tagline", { autoAlpha: 0, y: 20, duration: 0.4, ease: "power2.out" }, 1.8);

        // Platform pulse
        tl.to(r + " .plat", { borderColor: "#37bdf8", duration: 0.3, stagger: 0.08 }, 2.5);
        tl.to(r + " .plat", { borderColor: "#252d33", duration: 0.3, stagger: 0.08 }, 2.8);

        // Beam glow pulse
        tl.to(r + " .beam", { opacity: 0.5, duration: 0.5, yoyo: true, repeat: 2, ease: "sine.inOut" }, 2.5);

        tl.set({}, {}, 5);
        window.__timelines["s5-gateway"] = tl;
      })();
    </script>
  </div>
</template>
