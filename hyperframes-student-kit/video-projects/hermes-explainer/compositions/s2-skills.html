<template id="s2-skills-template">
  <div data-composition-id="s2-skills" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />
    <div class="scene">
      <!-- Grid bg -->
      <div class="grid-bg"></div>

      <!-- Section label -->
      <div class="lbl">SKILLS</div>

      <!-- Skill cards grid -->
      <div class="cards">
        <div class="card c1">
          <div class="card-icon">&lt;/&gt;</div>
          <div class="card-name">Code</div>
          <div class="card-desc">Write, debug, ship</div>
        </div>
        <div class="card c2">
          <div class="card-icon">&#x1F4E1;</div>
          <div class="card-name">Research</div>
          <div class="card-desc">Search, analyze, synthesize</div>
        </div>
        <div class="card c3">
          <div class="card-icon">&#x1F3AC;</div>
          <div class="card-name">Media</div>
          <div class="card-desc">Video, audio, images</div>
        </div>
        <div class="card c4">
          <div class="card-icon">&#x2699;&#xFE0F;</div>
          <div class="card-name">DevOps</div>
          <div class="card-desc">Deploy, monitor, automate</div>
        </div>
        <div class="card c5">
          <div class="card-icon">&#x1F4DA;</div>
          <div class="card-name">Learn</div>
          <div class="card-desc">Save &amp; reuse knowledge</div>
        </div>
        <div class="card c6">
          <div class="card-icon">&#x1F310;</div>
          <div class="card-name">Connect</div>
          <div class="card-desc">Web, APIs, platforms</div>
        </div>
      </div>

      <!-- Bottom tagline -->
      <div class="tagline">Load skills. Unlock superpowers.</div>
    </div>

    <style>
      [data-composition-id="s2-skills"] { position: absolute; inset: 0; background: #07121c; overflow: hidden; }
      [data-composition-id="s2-skills"] .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        padding: 100px 160px; box-sizing: border-box; gap: 36px;
      }
      [data-composition-id="s2-skills"] .grid-bg {
        position: absolute; inset: 0;
        background-image: linear-gradient(rgba(55,189,248,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55,189,248,0.04) 1px, transparent 1px);
        background-size: 80px 80px;
      }
      [data-composition-id="s2-skills"] .lbl {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 20px;
        color: #37bdf8; letter-spacing: 0.28em; text-transform: uppercase;
      }
      [data-composition-id="s2-skills"] .cards {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        width: 100%; max-width: 1200px;
      }
      [data-composition-id="s2-skills"] .card {
        background: #0d2031; border: 1.5px solid #252d33; border-radius: 20px;
        padding: 28px 24px; display: flex; flex-direction: column; gap: 10px;
        align-items: flex-start;
      }
      [data-composition-id="s2-skills"] .card-icon { font-size: 36px; line-height: 1; }
      [data-composition-id="s2-skills"] .card-name {
        font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 28px; color: #ffffff;
      }
      [data-composition-id="s2-skills"] .card-desc {
        font-family: "Roboto Mono", monospace; font-weight: 400; font-size: 16px; color: #96a2b6;
      }
      [data-composition-id="s2-skills"] .tagline {
        font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 36px;
        background: linear-gradient(90deg, #37bdf8, #5ee2d9);
        -webkit-background-clip: text; color: transparent;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const r = '[data-composition-id="s2-skills"]';

        tl.from(r + " .grid-bg", { autoAlpha: 0, duration: 0.5, ease: "power1.out" }, 0.1);
        tl.from(r + " .lbl", { autoAlpha: 0, y: -20, duration: 0.35, ease: "expo.out" }, 0.2);
        tl.from(r + " .card", {
          autoAlpha: 0, y: 40, scale: 0.9, duration: 0.4, ease: "back.out(1.4)", stagger: 0.1
        }, 0.4);
        tl.from(r + " .tagline", { autoAlpha: 0, y: 20, duration: 0.4, ease: "power2.out" }, 2.2);

        // Secondary: card icons pulse
        tl.to(r + " .card-icon", { scale: 1.15, duration: 0.3, ease: "back.out(2)", stagger: 0.08 }, 2.8);
        tl.to(r + " .card-icon", { scale: 1, duration: 0.2, ease: "power2.out", stagger: 0.08 }, 3.1);

        tl.set({}, {}, 5);
        window.__timelines["s2-skills"] = tl;
      })();
    </script>
  </div>
</template>
