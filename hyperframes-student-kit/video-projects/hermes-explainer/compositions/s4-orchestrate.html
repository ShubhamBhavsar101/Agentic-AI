<template id="s4-orchestrate-template">
  <div data-composition-id="s4-orchestrate" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />
    <div class="scene">
      <!-- Section label -->
      <div class="lbl">ORCHESTRATION</div>

      <!-- Central hub -->
      <div class="hub">
        <div class="hub-core">HERMES</div>
      </div>

      <!-- Agent nodes -->
      <div class="agent a1">
        <div class="agent-dot"></div>
        <div class="agent-name">Browser</div>
      </div>
      <div class="agent a2">
        <div class="agent-dot"></div>
        <div class="agent-name">Terminal</div>
      </div>
      <div class="agent a3">
        <div class="agent-dot"></div>
        <div class="agent-name">Files</div>
      </div>
      <div class="agent a4">
        <div class="agent-dot"></div>
        <div class="agent-name">Web</div>
      </div>
      <div class="agent a5">
        <div class="agent-dot"></div>
        <div class="agent-name">Cron</div>
      </div>
      <div class="agent a6">
        <div class="agent-dot"></div>
        <div class="agent-name">Delegate</div>
      </div>

      <!-- Connection lines SVG -->
      <svg class="connections" viewBox="0 0 1920 1080" preserveAspectRatio="none">
        <line class="conn" x1="960" y1="540" x2="400" y2="200" />
        <line class="conn" x1="960" y1="540" x2="1520" y2="200" />
        <line class="conn" x1="960" y1="540" x2="300" y2="540" />
        <line class="conn" x1="960" y1="540" x2="1620" y2="540" />
        <line class="conn" x1="960" y1="540" x2="450" y2="850" />
        <line class="conn" x1="960" y1="540" x2="1470" y2="850" />
      </svg>

      <!-- Tagline -->
      <div class="tagline">One agent. Infinite tools.</div>
    </div>

    <style>
      [data-composition-id="s4-orchestrate"] { position: absolute; inset: 0; background: #07121c; overflow: hidden; }
      [data-composition-id="s4-orchestrate"] .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        padding: 100px 160px; box-sizing: border-box; gap: 30px;
      }
      [data-composition-id="s4-orchestrate"] .lbl {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 20px;
        color: #37bdf8; letter-spacing: 0.28em; text-transform: uppercase; z-index: 3;
      }
      [data-composition-id="s4-orchestrate"] .hub {
        width: 140px; height: 140px; border-radius: 50%;
        background: radial-gradient(circle, #37bdf8, #195066);
        box-shadow: 0 0 60px rgba(55,189,248,0.5);
        display: flex; align-items: center; justify-content: center; z-index: 3;
      }
      [data-composition-id="s4-orchestrate"] .hub-core {
        font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 18px; color: #ffffff;
      }
      [data-composition-id="s4-orchestrate"] .agent {
        position: absolute; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 3;
      }
      [data-composition-id="s4-orchestrate"] .agent-dot {
        width: 48px; height: 48px; border-radius: 50%;
        background: #0d2031; border: 2px solid #37bdf8;
        box-shadow: 0 0 20px rgba(55,189,248,0.4);
      }
      [data-composition-id="s4-orchestrate"] .agent-name {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 16px; color: #96a2b6;
      }
      [data-composition-id="s4-orchestrate"] .a1 { top: 14%; left: 22%; }
      [data-composition-id="s4-orchestrate"] .a2 { top: 14%; right: 22%; }
      [data-composition-id="s4-orchestrate"] .a3 { top: 46%; left: 10%; }
      [data-composition-id="s4-orchestrate"] .a4 { top: 46%; right: 10%; }
      [data-composition-id="s4-orchestrate"] .a5 { bottom: 18%; left: 24%; }
      [data-composition-id="s4-orchestrate"] .a6 { bottom: 18%; right: 24%; }
      [data-composition-id="s4-orchestrate"] .connections {
        position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
      }
      [data-composition-id="s4-orchestrate"] .conn {
        stroke: #37bdf8; stroke-width: 1.5; stroke-opacity: 0.25;
        stroke-dasharray: 8 6;
      }
      [data-composition-id="s4-orchestrate"] .tagline {
        font-family: "Montserrat", sans-serif; font-weight: 700; font-size: 36px;
        color: #ffffff; z-index: 3;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const r = '[data-composition-id="s4-orchestrate"]';

        tl.from(r + " .lbl", { autoAlpha: 0, y: -20, duration: 0.35, ease: "expo.out" }, 0.2);
        tl.from(r + " .conn", { strokeDashoffset: 500, duration: 0.8, ease: "power2.out", stagger: 0.06 }, 0.3);
        tl.from(r + " .hub", { autoAlpha: 0, scale: 0, duration: 0.5, ease: "back.out(2)" }, 0.5);
        tl.from(r + " .agent", {
          autoAlpha: 0, scale: 0.5, duration: 0.35, ease: "back.out(1.8)", stagger: 0.1
        }, 0.8);
        tl.from(r + " .tagline", { autoAlpha: 0, y: 20, duration: 0.4, ease: "power2.out" }, 2.2);

        // Pulse agents
        tl.to(r + " .agent-dot", { scale: 1.2, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 2, stagger: 0.15 }, 2.5);
        tl.to(r + " .hub", { scale: 1.08, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 2 }, 3.0);

        tl.set({}, {}, 6);
        window.__timelines["s4-orchestrate"] = tl;
      })();
    </script>
  </div>
</template>
