<template id="s1-hook-template">
  <div data-composition-id="s1-hook" data-start="0" data-duration="4" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />
    <div class="scene">
      <!-- Corner ticks -->
      <div class="tick tl"></div>
      <div class="tick tr"></div>
      <div class="tick bl"></div>
      <div class="tick br"></div>

      <!-- Crosshair -->
      <div class="crosshair" aria-hidden="true">
        <div class="ch-v"></div>
        <div class="ch-h"></div>
        <div class="ch-dot"></div>
      </div>

      <!-- Terminal line -->
      <div class="term-line">
        <span class="term-prompt">&gt;_</span>
        <span class="term-text">What is Hermes?</span>
        <span class="term-caret"></span>
      </div>

      <!-- Main title -->
      <div class="hero-title">
        <span class="hero-line">YOUR AI AGENT,</span>
        <span class="hero-line accent">UNLEASHED.</span>
      </div>

      <!-- Subtitle -->
      <div class="sub">Autonomous. Persistent. Yours.</div>
    </div>

    <style>
      [data-composition-id="s1-hook"] {
        position: absolute; inset: 0; background: #07121c; overflow: hidden;
      }
      [data-composition-id="s1-hook"] .scene {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
        padding: 140px 200px; box-sizing: border-box; gap: 40px;
      }
      [data-composition-id="s1-hook"] .tick {
        position: absolute; width: 40px; height: 40px;
      }
      [data-composition-id="s1-hook"] .tick.tl { top: 60px; left: 60px; border-top: 2px solid #37bdf8; border-left: 2px solid #37bdf8; }
      [data-composition-id="s1-hook"] .tick.tr { top: 60px; right: 60px; border-top: 2px solid #37bdf8; border-right: 2px solid #37bdf8; }
      [data-composition-id="s1-hook"] .tick.bl { bottom: 60px; left: 60px; border-bottom: 2px solid #37bdf8; border-left: 2px solid #37bdf8; }
      [data-composition-id="s1-hook"] .tick.br { bottom: 60px; right: 60px; border-bottom: 2px solid #37bdf8; border-right: 2px solid #37bdf8; }
      [data-composition-id="s1-hook"] .crosshair {
        position: absolute; top: 50%; right: 160px; width: 120px; height: 120px; margin-top: -60px;
      }
      [data-composition-id="s1-hook"] .ch-v { position: absolute; top: 0; left: 50%; width: 1.5px; height: 100%; background: rgba(55,189,248,0.3); transform: translateX(-50%); }
      [data-composition-id="s1-hook"] .ch-h { position: absolute; left: 0; top: 50%; height: 1.5px; width: 100%; background: rgba(55,189,248,0.3); transform: translateY(-50%); }
      [data-composition-id="s1-hook"] .ch-dot { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #37bdf8; border-radius: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 18px rgba(55,189,248,0.9); }
      [data-composition-id="s1-hook"] .term-line {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 32px;
        color: #96a2b6; display: flex; align-items: center; gap: 14px;
      }
      [data-composition-id="s1-hook"] .term-prompt { color: #37bdf8; font-weight: 700; }
      [data-composition-id="s1-hook"] .term-caret { display: inline-block; width: 12px; height: 30px; background: #37bdf8; margin-left: 4px; }
      [data-composition-id="s1-hook"] .hero-title { display: flex; flex-direction: column; gap: 4px; }
      [data-composition-id="s1-hook"] .hero-line {
        font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 130px;
        letter-spacing: -0.03em; line-height: 1; color: #ffffff;
      }
      [data-composition-id="s1-hook"] .hero-line.accent {
        background: linear-gradient(90deg, #37bdf8, #5ee2d9);
        -webkit-background-clip: text; color: transparent;
        text-shadow: none;
      }
      [data-composition-id="s1-hook"] .sub {
        font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 28px;
        color: #96a2b6; letter-spacing: 0.12em;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function() {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const r = '[data-composition-id="s1-hook"]';

        tl.from(r + " .tick", { autoAlpha: 0, scale: 0.5, duration: 0.3, stagger: 0.06, ease: "expo.out" }, 0.1);
        tl.from(r + " .term-prompt", { autoAlpha: 0, x: -15, duration: 0.25, ease: "expo.out" }, 0.3);
        tl.fromTo(r + " .term-text", { clipPath: "inset(0 100% 0 0)" }, { clipPath: "inset(0 0% 0 0)", duration: 1.0, ease: "steps(20)" }, 0.5);
        tl.fromTo(r + " .term-caret", { autoAlpha: 0.2 }, { autoAlpha: 1, duration: 0.5, ease: "steps(1)", repeat: 5, yoyo: true }, 0.6);
        tl.from(r + " .hero-line:first-child", { autoAlpha: 0, y: 60, scale: 0.92, duration: 0.5, ease: "back.out(1.6)" }, 1.6);
        tl.from(r + " .hero-line.accent", { autoAlpha: 0, y: 60, scale: 0.92, duration: 0.5, ease: "back.out(1.8)" }, 2.0);
        tl.from(r + " .crosshair", { autoAlpha: 0, scale: 0.3, duration: 0.5, ease: "power4.out" }, 2.2);
        tl.to(r + " .ch-dot", { scale: 1.3, duration: 0.5, ease: "sine.inOut", repeat: 3, yoyo: true }, 2.8);
        tl.from(r + " .sub", { autoAlpha: 0, y: 20, duration: 0.4, ease: "power2.out" }, 2.8);
        tl.to(r + " .scene", { scale: 1.03, duration: 1.0, ease: "power2.in", transformOrigin: "50% 50%" }, 3.0);

        tl.set({}, {}, 4);
        window.__timelines["s1-hook"] = tl;
      })();
    </script>
  </div>
</template>
